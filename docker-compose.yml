services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plataforma_revisoria}
      POSTGRES_USER: ${POSTGRES_USER:-plataforma_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plataforma_app} -d ${POSTGRES_DB:-plataforma_revisoria}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - caracterizacion_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
        
    env_file:
      - .env

    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
    expose:
      - "3000"
    networks:
      - caracterizacion_net

volumes:
  postgres_data:

networks:
  caracterizacion_net:
    driver: bridge